#import UserId, Partner, UserProfile, UserType, WhereUser from "lucuma/odb/graphql/OdbSchema.graphql"

type Query {

  "The current user."
  user: User!

  "The current user's active role."
  role: Role!

  "Select users. Available only to admin and staff roles."
  users(
    "Filters the selection of users."
    WHERE: WhereUser

    "Starts the result set at (or after if not existent) the given id."
    OFFSET: UserId

    "Limits the result to at most this number of matches (but never more than 1000)."
    LIMIT: NonNegInt

    "Set to true to include disabled values"
    includeDisabled: Boolean! = false
  ): UserSelectResult!

}

"""
The user results, limited to a maximum of 1000 entries.
"""
type UserSelectResult {
  """
  Matching users up to the return size limit of 1000
  """
  matches: [User!]!

  """
  `true` when there were additional matches that were not returned.
  """
  hasMore: Boolean!
}

type Mutation {

  "Create and return an API key for the specified role, if owned by the current user."
  createApiKey(role: RoleId!): String!

  "Delete the specified API key, if owned by the current user. Returns the constant value `true`."
  deleteApiKey(id: ApiKeyId!): Boolean!

  "Add a user role, or look up the role if it already exists. Available only to admin and service users."
  addRole(userId: UserId!, roleType: RoleType!, partner: Partner): RoleId!

  """
  Delete the specified role. Available only to admin and service users. Sessions
  associated with this role will be deleted and will fail to renew on the next attempt. Note
  that the PI role cannot be deleted.
  """
  deleteRole(roleId: RoleId!): Boolean!

}

type Subscription {

  "A subscription that yields revoked API key identifiers."
  apiKeyRevocation: ApiKeyId!

}

type User {
  id:       UserId!
  orcidId:  OrcidId
  profile:  UserProfile
  type:     UserType!
  enabled:  Boolean!
  roles:    [Role!]!
  apiKeys:  [ApiKey!]!
}

type Role {
  id:      RoleId!
  type:    RoleType!
  partner: Partner
  user:    User!
}

type ApiKey {
  id:   ApiKeyId!
  user: User!
  role: Role!
}

scalar OrcidId
scalar RoleId
scalar ApiKeyId
scalar NonNegInt

enum RoleType { PI NGO STAFF ADMIN }
