#import UserId, Partner, UserProfile from "lucuma/odb/graphql/OdbSchema.graphql"

type Query {
  user: User!
  role: Role!
}

type Mutation {

  "Create and return an API key for the specified role, if owned by the current user."
  createApiKey(role: RoleId!): String!

  "Delete the specified API key, if owned by the current user. Returns the constant value `true`."
  deleteApiKey(id: ApiKeyId!): Boolean!

  "Add a user role, or look up the role if it already exists. Available only to admin and service users."
  addRole(userId: UserId!, roleType: RoleType!, partner: Partner): RoleId!

  """
  Delete the specified role. Available only to admin and service users. Sessions
  associated with this role will be deleted and will fail to renew on the next attempt. Note
  that the PI role cannot be deleted.
  """
  deleteRole(roleId: RoleId!): Boolean!

}

type Subscription {

  "A subscription that yields revoked API key identifiers."
  apiKeyRevocation: ApiKeyId!

}

type User {
  id:       UserId!
  orcidId:  OrcidId!
  profile:  UserProfile!
  roles:    [Role!]!
  apiKeys:  [ApiKey!]!
}

type Role {
  id:      RoleId!
  type:    RoleType!
  partner: Partner
  user:    User!
}

type ApiKey {
  id:   ApiKeyId!
  user: User!
  role: Role!
}

scalar OrcidId
scalar RoleId
scalar ApiKeyId

enum RoleType { PI NGO STAFF ADMIN }
